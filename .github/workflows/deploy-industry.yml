name: Deploy Industry - Docker Image

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}
  CONTAINER_NAME: ttt-app-cicd-demo
  APP_PORT: 3000
  HOST_PORT: 3000

jobs:
  build-and-push:
    name: Build and push Docker image
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: echo "image_tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io \
            -u "${{ github.actor }}" \
            --password-stdin

      - name: Build Docker image
        run: |
          docker build \
            -t $IMAGE_NAME:${{ steps.meta.outputs.image_tag }} \
            -t $IMAGE_NAME:latest \
            .

      - name: Push Docker image
        run: |
          docker push $IMAGE_NAME:${{ steps.meta.outputs.image_tag }}
          docker push $IMAGE_NAME:latest

  deploy:
    name: Deploy Docker image to EC2
    runs-on: ubuntu-latest
    needs: build-and-push

    environment:
      name: production

    steps:
      - name: Deploy container on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.TTT_APP_EC2_HOST }}
          username: ${{ secrets.TTT_APP_EC2_USER }}
          key: ${{ secrets.TTT_APP_EC2_SSH_KEY }}
          script: |
            echo configure pm2 to not start on system boot
            pm2 delete all || true
            pm2 save
            sudo env PATH=$PATH:/usr/bin /usr/lib/node_modules/pm2/bin/pm2 unstartup systemd -u ${{ secrets.TTT_APP_EC2_USER }} --hp /home/${{ secrets.TTT_APP_EC2_USER }}
            
            echo "${{ secrets.GHCR_READ_PAT }}" | docker login ghcr.io \
              -u "${{ github.repository_owner }}" \
              --password-stdin

            docker pull ${{ env.IMAGE_NAME }}:${{ needs.build-and-push.outputs.image_tag }}

            docker stop ${{ env.CONTAINER_NAME }} || true
            docker rm ${{ env.CONTAINER_NAME }} || true

            docker run -d \
              --name ${{ env.CONTAINER_NAME }} \
              --restart unless-stopped \
              -p ${{ env.HOST_PORT }}:${{ env.APP_PORT }} \
              ${{ env.IMAGE_NAME }}:${{ needs.build-and-push.outputs.image_tag }}

            docker image prune -af